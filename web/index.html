<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Warm the HERE endpoints early so the route planner's heavy SDK bundles
         (js.api.here.com), vector tiles (vector.hereapi.com), routing and the
         geocode/discover/autosuggest/lookup search calls don't pay DNS/TLS setup
         on first use. -->
    <link rel="preconnect" href="https://js.api.here.com" crossorigin />
    <link rel="preconnect" href="https://vector.hereapi.com" crossorigin />
    <link rel="dns-prefetch" href="https://router.hereapi.com" />
    <link rel="dns-prefetch" href="https://geocode.search.hereapi.com" />
    <link rel="dns-prefetch" href="https://discover.search.hereapi.com" />
    <link rel="dns-prefetch" href="https://autosuggest.search.hereapi.com" />
    <link rel="dns-prefetch" href="https://lookup.search.hereapi.com" />
    <!-- Amazon Location is used ONLY by the vehicle-location modal's MapLibre map,
         which fetches map tiles/style (no places/routing). The route planner uses
         no Amazon endpoint. -->
    <link rel="preconnect" href="https://maps.geo.eu-central-1.amazonaws.com" crossorigin />
    <title>Dispo-chat</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
